name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest ruff
      - name: Download data
        run: |
          mkdir -p data
          curl -fSL https://raw.githubusercontent.com/martj42/international_results/master/results.csv -o data/results.csv
          wc -l data/results.csv
      - name: Train model
        run: python -m wcpredictor train
      - name: Lint
        run: ruff check .
      - name: Run tests
        run: pytest
